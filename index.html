<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vehicle Experience Survey</title>
<style>
body {
  font-family: Arial, sans-serif;
  max-width: 800px;
  margin: 40px auto;
  padding: 0 20px;
}

h2 { margin-bottom: 30px; }
.question { margin-bottom: 70px; }
.question p { font-size: 18px; margin-bottom: 15px; }

.scale-container {
  display: flex;
  align-items: center;
  gap: 10px;
}

.button {
  width: 40px;
  height: 40px;
  font-size: 18px;
  cursor: pointer;
}

.slider-track {
  position: relative;
  flex: 1;
  height: 6px;
  background: #ddd;
  border-radius: 3px;
}

.slider-thumb {
  position: absolute;
  top: -7px;
  width: 20px;
  height: 20px;
  background: #1e73be;
  border-radius: 50%;
  cursor: pointer;
}

.value-bubble {
  position: absolute;
  top: -28px;
  transform: translateX(-50%);
  background: #1e73be;
  color: white;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: bold;
  pointer-events: none;
}

.marker {
  position: absolute;
  top: 10px;
  font-size: 13px;
  font-weight: bold;
  color: #0077cc;
  transform: translateX(-50%);
}
</style>
</head>
<body>

<h2>Vehicle Experience Survey</h2>

<!-- COMFORT -->
<div class="question">
<p>Comfort – I am at ease while the vehicle is en route.</p>
<div class="scale-container">
<button class="button" onclick="adjust('comfort', -1)">−</button>
<div class="slider-track" id="comfort_track">
  <div class="slider-thumb" id="comfort_thumb"></div>
  <div class="value-bubble" id="comfort_bubble"></div>
  <div class="marker" style="left:0%">0</div>
  <div class="marker" style="left:100%">100</div>
</div>
<button class="button" onclick="adjust('comfort', 1)">+</button>
</div>
</div>

<!-- VULNERABILITY -->
<div class="question">
<p>Vulnerability – I feel that the vehicle will take me safely.</p>
<div class="scale-container">
<button class="button" onclick="adjust('vulnerability', -1)">−</button>
<div class="slider-track" id="vulnerability_track">
  <div class="slider-thumb" id="vulnerability_thumb"></div>
  <div class="value-bubble" id="vulnerability_bubble"></div>
  <div class="marker" style="left:0%">0</div>
  <div class="marker" style="left:100%">100</div>
</div>
<button class="button" onclick="adjust('vulnerability', 1)">+</button>
</div>
</div>

<!-- PUNCTUALITY -->
<div class="question">
<p>Punctuality – I feel that the vehicle will take me on time.</p>
<div class="scale-container">
<button class="button" onclick="adjust('punctuality', -1)">−</button>
<div class="slider-track" id="punctuality_track">
  <div class="slider-thumb" id="punctuality_thumb"></div>
  <div class="value-bubble" id="punctuality_bubble"></div>
  <div class="marker" style="left:0%">0</div>
  <div class="marker" style="left:100%">100</div>
</div>
<button class="button" onclick="adjust('punctuality', 1)">+</button>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="survey.js"></script>

</body>
</html>
