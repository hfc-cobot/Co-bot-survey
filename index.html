<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vehicle Experience Survey</title>

<style>
body{
  font-family: Arial, sans-serif;
  max-width: 1000px;
  margin:0 auto;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.survey-row{
  display:flex;
  justify-content:space-around;
  align-items:flex-start;
  gap:80px;
}

.question{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.question p{
  font-size:18px;
  margin-bottom:15px;
}

.scale-container{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

.button{
  width:40px;
  height:40px;
  font-size:20px;
  cursor:pointer;
}

.slider-track{
  position:relative;
  width:10px;
  height:60vh;
  min-height:300px;
  max-height:600px;
  background:#ddd;
  border-radius:6px;
}

.slider-fill{
  position:absolute;
  bottom:0;
  width:100%;
  background:#1e73be;
  border-radius:6px;
}

.slider-thumb{
  position:absolute;
  left:50%;
  transform:translate(-50%, 50%);
  width:22px;
  height:22px;
  background:#1e73be;
  border-radius:50%;
  cursor:pointer;
}

.value-bubble{
  position:absolute;
  left:40px;
  transform:translateY(50%);
  background:#1e73be;
  color:white;
  padding:4px 8px;
  font-size:13px;
  border-radius:6px;
  font-weight:bold;
}

.label{
  position:absolute;
  left:20px;
  font-size:12px;
  color:#555;
}

@media (max-width:700px){
  .survey-row{
    flex-direction:column;
    align-items:center;
  }
}
</style>
</head>

<body>

<h2>Vehicle Experience Survey</h2>

<div class="survey-row">

  <div class="question">
    <p>Task Fulfillment</p>

    <div class="scale-container">
      <button class="button" onclick="adjust('task',1)">+</button>

      <div class="slider-track" id="task_track">
        <div class="slider-fill" id="task_fill"></div>
        <div class="slider-thumb" id="task_thumb"></div>
        <div class="value-bubble" id="task_bubble"></div>
        <div class="label" id="task_top">100</div>
        <div class="label" id="task_bottom">0</div>
      </div>

      <button class="button" onclick="adjust('task',-1)">−</button>
    </div>
  </div>

  <div class="question">
    <p>Safety</p>

    <div class="scale-container">
      <button class="button" onclick="adjust('safety',1)">+</button>

      <div class="slider-track" id="safety_track">
        <div class="slider-fill" id="safety_fill"></div>
        <div class="slider-thumb" id="safety_thumb"></div>
        <div class="value-bubble" id="safety_bubble"></div>
        <div class="label" id="safety_top">100</div>
        <div class="label" id="safety_bottom">0</div>
      </div>

      <button class="button" onclick="adjust('safety',-1)">−</button>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="survey.js"></script>

</body>
</html>
