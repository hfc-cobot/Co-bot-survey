<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vehicle Experience Survey</title>

<style>
body{
  font-family: Arial, sans-serif;
  max-width: 800px;
  margin:40px auto;
}

.question{
  margin-bottom:60px;
}

.question p{
  font-size:18px;
  margin-bottom:15px;
}

.scale-container{
  display:flex;
  align-items:center;
  gap:12px;
}

.button{
  width:40px;
  height:40px;
  font-size:20px;
  cursor:pointer;
}

.slider-track{
  position:relative;
  flex:1;
  height:8px;
  background:#ddd;
  border-radius:6px;
}

.slider-fill{
  position:absolute;
  height:100%;
  background:#1e73be;
  border-radius:6px;
}

.slider-thumb{
  position:absolute;
  top:50%;
  transform:translate(-50%, -50%);
  width:22px;
  height:22px;
  background:#1e73be;
  border-radius:50%;
  cursor:pointer;
}

.value-bubble{
  position:absolute;
  top:-34px;
  transform:translateX(-50%);
  background:#1e73be;
  color:white;
  padding:4px 8px;
  font-size:13px;
  border-radius:6px;
  font-weight:bold;
}

.label{
  position:absolute;
  top:14px;
  transform:translateX(-50%);
  font-size:12px;
  color:#555;
}
</style>
</head>

<body>

<h2>Vehicle Experience Survey</h2>

<!-- TASK -->
<div class="question">
<p>Task Fulfillment</p>
<div class="scale-container">
<button class="button" onclick="adjust('task',-1)">−</button>

<div class="slider-track" id="task_track">
<div class="slider-fill" id="task_fill"></div>
<div class="slider-thumb" id="task_thumb"></div>
<div class="value-bubble" id="task_bubble"></div>
<div class="label" id="task_label_0">0</div>
<div class="label" id="task_label_100">100</div>
</div>

<button class="button" onclick="adjust('task',1)">+</button>
</div>
</div>

<!-- VULNERABILITY -->
<div class="question">
<p>Vulnerability</p>
<div class="scale-container">
<button class="button" onclick="adjust('vulnerability',-1)">−</button>

<div class="slider-track" id="vulnerability_track">
<div class="slider-fill" id="vulnerability_fill"></div>
<div class="slider-thumb" id="vulnerability_thumb"></div>
<div class="value-bubble" id="vulnerability_bubble"></div>
<div class="label" id="vulnerability_label_0">0</div>
<div class="label" id="vulnerability_label_100">100</div>
</div>

<button class="button" onclick="adjust('vulnerability',1)">+</button>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="survey.js"></script>

</body>
</html>
